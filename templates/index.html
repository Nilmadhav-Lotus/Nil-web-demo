{% extends "layout.html" %}

{% block content %}
<div class="pt-3 pb-2 mb-3 border-bottom border-secondary">
    <h1 class="h2 neon-text">Gylsmix Control Panel</h1>
</div>

<div class="row mb-4">
    <div class="col-md-4">
        <div class="glass-card p-4">
            <h6 class="text-secondary text-uppercase">System Power</h6>
            <h3 class="text-info">67%</h3>
        </div>
    </div>
    <div class="col-md-4">
        <div class="glass-card p-4">
            <h6 class="text-secondary text-uppercase">Network Ping</h6>
            <h3 class="text-success">12ms</h3>
        </div>
    </div>
</div>

<div class="glass-card p-4">
    <h4 class="mb-4 text-white">Live Frequency Data</h4>
    <div style="max-height: 350px; display: flex; justify-content: center;">
        <canvas id="dashboardChart"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const ctx = document.getElementById('dashboardChart').getContext('2d');
    
    new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: {{ sensor_data.labels | tojson }},
            datasets: [{
                label: 'Signal Strength',
                data: {{ sensor_data.amounts | tojson }},
                backgroundColor: [
                    '#00d4ff', '#ff00ff', '#ffff00', 
                    '#39ff14', '#8a2be2', '#ff4500'
                ],
                borderColor: 'rgba(255, 255, 255, 0.1)',
                borderWidth: 2,
                hoverOffset: 20
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'right',
                    labels: { color: '#fff', font: { size: 14 } }
                }
            }
        }
    });
</script>
{% endblock %}
