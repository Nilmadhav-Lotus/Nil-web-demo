<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Gateway</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { 
            height: 100vh; 
            margin: 0; 
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        }
        
        /* This fixes the "too small" issue from your screenshot */
        .choice-card { 
            width: 320px;          /* Comfortable width */
            padding: 40px 20px;    /* Spacious padding */
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 15px;
            transition: 0.4s ease;
        }

        .icon-box { 
            font-size: 4rem;       /* Large, clear icons */
            margin-bottom: 10px;
        }

        .neon-text {
            text-shadow: 0 0 10px #0d6efd, 0 0 20px #0d6efd;
            font-weight: bold;
        }

        /* Custom Magenta Button for Portfolio */
        .btn-outline-magenta {
            border-color: #ff00ff;
            color: #ff00ff;
        }
        .btn-outline-magenta:hover {
            background-color: #ff00ff;
            color: white;
            box-shadow: 0 0 15px #ff00ff;
        }
    </style>
</head>
<body class="d-flex flex-column align-items-center justify-content-center">

    <div class="text-center mb-5">
        <h1 class="neon-text display-3">SYSTEM GATEWAY</h1>
        <p class="text-secondary" style="letter-spacing: 3px;">SELECT TERMINAL MODULE</p>
    </div>

    <div class="d-flex flex-wrap justify-content-center gap-5">
        
        <a href="/dashboard" class="glass-card choice-card text-decoration-none">
            <span class="icon-box">📊</span>
            <h2 class="text-info">DASHBOARD</h2>
            <p class="text-secondary small">Access Live Analytics & Telemetry</p>
            <div class="btn btn-outline-info btn-sm px-4 mt-2">Enter</div>
        </a>

        <a href="/portfolio" class="glass-card choice-card text-decoration-none">
            <span class="icon-box">👤</span>
            <h2 style="color: #ff00ff;">PORTFOLIO</h2>
            <p class="text-secondary small">View Projects & Developer Bio</p>
            <div class="btn btn-outline-magenta btn-sm px-4 mt-2">View</div>
        </a>

    </div>

</body>
</html>
